<section id="projects" class="projects-container" appScrollReveal>
    <h2 class="projects-title">Projects</h2>
    <div class="projects-grid">
        @for (project of projects; track project.title) {
        <app-project-card [title]="project.title" [description]="project.description" [githubUrl]="project.githubUrl"
            [liveUrl]="project.liveUrl ?? ''" [previewTitle]="project.previewTitle ?? ''"
            [techTags]="project.techTags" />
        }
    </div>
</section>
